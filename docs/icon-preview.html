<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アイコンプレビュー — あそぶ？</title>
<style>
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f5f7;
    color: #1c1c1e;
    margin: 0;
    padding: 32px 16px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #f0f0f0; }
    .card { background: #2a2a2c; }
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 24px; text-align: center; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 24px 0;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .card img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    display: block;
  }
  .card .label {
    font-size: 12px;
    color: #6b6b70;
    margin-top: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ios-mock {
    text-align: center;
    margin: 32px 0;
  }
  .ios-mock img {
    width: 220px;
    height: auto;
    /* iOS squircle 近似 + 影 */
    filter: drop-shadow(0 16px 32px rgba(0,0,0,0.25));
    border-radius: 49.2px;  /* 220 * 0.2237 */
  }
  .ios-mock .caption {
    font-size: 13px;
    color: #6b6b70;
    margin-top: 16px;
  }
  .home-mock {
    background: linear-gradient(135deg, #e8d8f0, #c8d8f0);
    border-radius: 24px;
    padding: 40px 24px;
    margin: 24px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
  }
  .home-mock .app {
    text-align: center;
    width: 80px;
  }
  .home-mock .app img,
  .home-mock .app .placeholder {
    width: 64px;
    height: 64px;
    border-radius: 14.3px;
    display: block;
    margin: 0 auto 6px;
    background: white;
  }
  .home-mock .app img.real {
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  }
  .home-mock .app .placeholder {
    background: rgba(255,255,255,0.7);
  }
  .home-mock .app .name {
    font-size: 11px;
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
<div class="container">
<h1>あそぶ？ アプリアイコン プレビュー</h1>

<div class="ios-mock">
  <img src="icon-preview.png" alt="あそぶ？ アイコン（iOS角丸適用版）">
  <div class="caption">iOS 角丸（squircle 22.37%）+ 影 適用版</div>
</div>

<div class="grid">
  <div class="card">
    <img src="icon-raw.png" alt="raw">
    <div class="label">1024×1024 raw PNG</div>
  </div>
  <div class="card">
    <img src="icon-preview.png" alt="ios">
    <div class="label">ホーム画面表示時の見た目</div>
  </div>
</div>

<h2 style="font-size:16px; margin-top:40px;">ホーム画面風レイアウト</h2>
<div class="home-mock">
  <div class="app">
    <img class="real" src="icon-preview.png" alt="あそぶ？">
    <div class="name">あそぶ？</div>
  </div>
  <div class="app">
    <div class="placeholder"></div>
    <div class="name">メモ</div>
  </div>
  <div class="app">
    <div class="placeholder"></div>
    <div class="name">写真</div>
  </div>
  <div class="app">
    <div class="placeholder"></div>
    <div class="name">時計</div>
  </div>
</div>

</div>
</body>
</html>
